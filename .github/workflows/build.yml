name: Build bridge .exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Download NSSM (for Windows Service install)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" -OutFile nssm.zip
          Expand-Archive -Path nssm.zip -DestinationPath nssm-tmp -Force
          Copy-Item nssm-tmp/nssm-2.24/win64/nssm.exe -Destination nssm.exe
          Get-Item nssm.exe | Format-List

      - name: Build .exe
        run: pyinstaller bridge.spec --clean --noconfirm

      - name: Rename artifact
        shell: pwsh
        run: |
          Move-Item dist\360booking-bridge.exe dist\360booking-bridge-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 360booking-bridge-setup
          path: dist/360booking-bridge-setup.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Falls back to GITHUB_TOKEN if the PAT isn't set — lets the
          # workflow work both with org-level "read-only" policies
          # (using GH_RELEASE_TOKEN) and with default permissive setups.
          token: ${{ secrets.GH_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          files: dist/360booking-bridge-setup.exe
