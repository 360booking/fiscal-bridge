name: Build bridge .exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build .exe
        run: pyinstaller bridge.spec --clean --noconfirm

      - name: Rename artifact
        shell: pwsh
        run: |
          Move-Item dist\360booking-bridge.exe dist\360booking-bridge-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 360booking-bridge-setup
          path: dist/360booking-bridge-setup.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/360booking-bridge-setup.exe
